<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1e1e1e;
            color: #cccccc;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            font-size: 1.4em;
            font-weight: 500;
            color: #fff;
        }
        
        .stats {
            display: flex;
            gap: 24px;
            font-size: 0.85em;
            color: #858585;
        }
        
        .stat-value {
            color: #fff;
            font-weight: 500;
        }
        
        .servers {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 16px;
            align-items: start;
        }

        .access-panel {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
        }

        .access-tools {
            display: grid;
            grid-template-columns: minmax(280px, 0.95fr) minmax(420px, 1.35fr);
            gap: 12px;
            margin-bottom: 12px;
            align-items: stretch;
        }

        .access-tool-card {
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            border-radius: 6px;
            padding: 12px;
        }

        .access-tool-card-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .access-tool-title {
            color: #fff;
            font-size: 0.92em;
            font-weight: 500;
        }

        .access-tool-desc {
            color: #858585;
            font-size: 0.74em;
            line-height: 1.45;
            margin-top: 3px;
        }

        .access-shortcut {
            color: #6d6d6d;
            font-size: 0.68em;
            border: 1px solid #3c3c3c;
            border-radius: 999px;
            padding: 3px 7px;
            white-space: nowrap;
        }

        .access-section {
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            border-radius: 6px;
            overflow: hidden;
        }

        .access-section > summary {
            list-style: none;
            cursor: pointer;
        }

        .access-section > summary::-webkit-details-marker {
            display: none;
        }

        .access-section[open] .access-header {
            border-bottom-color: #3c3c3c;
        }

        .access-section > summary:hover .access-header {
            background: rgba(255, 255, 255, 0.03);
        }

        .access-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid transparent;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .access-title {
            color: #fff;
            font-size: 1em;
            font-weight: 500;
        }

        .access-meta {
            color: #6d6d6d;
            font-size: 0.75em;
        }

        .access-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            padding: 12px;
            margin: 0 12px 12px;
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 6px;
        }

        .access-actions button {
            background: #0e639c;
            color: #fff;
            border: 1px solid #1177bb;
            border-radius: 4px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .access-actions button:disabled {
            background: #3c3c3c;
            border-color: #4a4a4a;
            color: #858585;
            cursor: not-allowed;
        }

        .ssh-key-check {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) auto;
            gap: 8px;
            align-items: start;
        }

        .user-add-form {
            display: grid;
            grid-template-columns: minmax(120px, 160px) minmax(240px, 1fr) minmax(150px, 190px) auto;
            gap: 8px;
            align-items: start;
        }

        .ssh-key-input,
        .user-add-input {
            width: 100%;
            resize: vertical;
            background: #1e1e1e;
            color: #cccccc;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 8px 10px;
            font-size: 0.8em;
            font-family: monospace;
        }

        .ssh-key-input {
            min-height: 58px;
        }

        .user-add-input {
            min-height: 36px;
            resize: none;
        }

        .user-add-key {
            min-height: 58px;
            resize: vertical;
        }

        .ssh-key-input:focus,
        .user-add-input:focus {
            outline: none;
            border-color: #0e639c;
            box-shadow: 0 0 0 2px rgba(14, 99, 156, 0.25);
        }

        .ssh-key-check button,
        .user-add-form button {
            background: #0e639c;
            color: #fff;
            border: 1px solid #1177bb;
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.8em;
            white-space: nowrap;
        }

        .ssh-key-check button:disabled,
        .user-add-form button:disabled {
            background: #3c3c3c;
            border-color: #4a4a4a;
            color: #858585;
            cursor: not-allowed;
        }

        .ssh-key-result,
        .user-add-result {
            grid-column: 1 / -1;
            min-height: 18px;
        }

        @media (max-width: 640px) {
            .ssh-key-check,
            .user-add-form {
                grid-template-columns: 1fr;
            }
        }

        .access-result {
            color: #858585;
            font-size: 0.8em;
        }

        .access-table-wrap {
            overflow-x: auto;
            padding: 0 12px 12px;
        }

        .access-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8em;
        }

        .access-table th,
        .access-table td {
            border: 1px solid #3c3c3c;
            padding: 9px 10px;
            text-align: center;
            white-space: nowrap;
        }

        .access-table th {
            color: #dcdcaa;
            background: #1e1e1e;
            font-weight: 500;
        }

        .access-table input[type="checkbox"] {
            cursor: pointer;
        }

        .access-user {
            color: #9cdcfe;
            font-weight: 500;
            text-align: left !important;
        }

        .access-ok {
            color: #4ec9b0;
        }

        .access-missing {
            color: #ce9178;
        }

        .access-error {
            color: #f14c4c;
        }
        
        .server-card {
            background: #252526;
            border-radius: 6px;
            border: 1px solid #3c3c3c;
            overflow: hidden;
            align-self: start;
        }

        .server-card[open] {
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
        }

        .server-card > summary,
        .gpu-item > summary,
        .process-list > summary,
        .access-section > summary {
            list-style: none;
            cursor: pointer;
        }

        .server-card > summary::-webkit-details-marker,
        .gpu-item > summary::-webkit-details-marker,
        .process-list > summary::-webkit-details-marker,
        .access-section > summary::-webkit-details-marker {
            display: none;
        }
        
        .server-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid transparent;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .server-card[open] .server-header {
            border-bottom-color: #3c3c3c;
        }

        .server-card > summary:hover .server-header,
        .gpu-item > summary:hover .gpu-header,
        .process-list > summary:hover .process-title,
        .access-section > summary:hover .access-header {
            background: rgba(255, 255, 255, 0.03);
        }
        
        .server-name {
            font-size: 1em;
            font-weight: 500;
            color: #fff;
        }
        
        .server-host {
            color: #6d6d6d;
            font-size: 0.75em;
            margin-top: 2px;
        }
        
        .status {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.7em;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        .status.online {
            background: #3c3c3c;
            color: #4ec9b0;
            border: 1px solid #4ec9b0;
        }
        
        .status.offline {
            background: #3c3c3c;
            color: #f14c4c;
            border: 1px solid #f14c4c;
        }

        .server-summary-meta,
        .gpu-summary-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .summary-count {
            color: #858585;
            font-size: 0.72em;
            padding: 3px 7px;
            border: 1px solid #3c3c3c;
            border-radius: 999px;
            background: #1e1e1e;
            white-space: nowrap;
        }

        .collapse-caret {
            color: #858585;
            font-size: 0.78em;
            transition: transform 0.2s ease;
        }

        .server-card[open] .server-header .collapse-caret,
        .gpu-item[open] .gpu-header .collapse-caret,
        .process-list[open] .process-title .collapse-caret,
        .access-section[open] .access-header .collapse-caret {
            transform: rotate(90deg);
        }
        
        .gpu-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            padding: 14px 16px 16px;
        }
        
        .gpu-item {
            background: #1e1e1e;
            border-radius: 4px;
            border: 1px solid #3c3c3c;
            overflow: hidden;
            min-width: 0;
        }

        .gpu-item[open] {
            border-color: #4a4a4a;
        }
        
        .gpu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 11px 12px;
            transition: background 0.2s ease;
        }

        @media (max-width: 980px) {
            .gpu-list {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1100px) {
            .access-tools {
                grid-template-columns: 1fr;
            }
        }
        
        .gpu-name {
            color: #dcdcaa;
            font-weight: 500;
            font-size: 0.85em;
        }
        
        .gpu-id {
            color: #6d6d6d;
            font-size: 0.75em;
            font-family: monospace;
        }
        
        .metrics {
            display: flex;
            gap: 16px;
            padding: 0 12px 12px;
        }
        
        .metric-box {
            flex: 1;
        }
        
        .metric-label {
            color: #6d6d6d;
            font-size: 0.7em;
            margin-bottom: 3px;
        }
        
        .metric-value {
            color: #ccc;
            font-size: 0.8em;
            font-family: monospace;
        }
        
        .progress-bar {
            background: #3c3c3c;
            border-radius: 2px;
            height: 5px;
            margin-top: 4px;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        .progress-fill.gpu { background: #569cd6; }
        .progress-fill.memory { background: #ce9178; }
        
        .process-list {
            border-top: 1px solid #3c3c3c;
        }
        
        .process-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #6d6d6d;
            font-size: 0.7em;
            padding: 8px 12px;
            transition: background 0.2s ease;
        }

        .process-items {
            padding: 0 12px 10px;
        }
        
        .process-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 8px;
            background: #252526;
            border-radius: 3px;
            margin-bottom: 3px;
            font-size: 0.8em;
        }
        
        .process-item:last-child {
            margin-bottom: 0;
        }
        
        .process-user {
            color: #9cdcfe;
            font-weight: 500;
        }
        
        .process-memory {
            color: #b5cea8;
            font-family: monospace;
        }
        
        .no-process {
            color: #6d6d6d;
            font-size: 0.7em;
            text-align: center;
            padding: 0 12px 12px;
            border-top: 1px solid #3c3c3c;
            padding-top: 8px;
        }
        
        .error {
            color: #f14c4c;
            font-size: 0.85em;
            padding: 12px;
            text-align: center;
        }
        
        .refresh-info {
            text-align: center;
            color: #6d6d6d;
            font-size: 0.75em;
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px solid #3c3c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GPU Monitor</h1>
            <div class="stats">
                <span>Servers: <span class="stat-value" id="total-servers">-</span></span>
                <span>GPUs: <span class="stat-value" id="total-gpus">-</span></span>
                <span>Processes: <span class="stat-value" id="total-processes">-</span></span>
            </div>
        </header>
        <div class="access-panel">
            <div class="access-tools">
                <div class="access-tool-card">
                    <div class="access-tool-card-header">
                        <div>
                            <div class="access-tool-title">检查 Key 是否存在</div>
                            <div class="access-tool-desc">粘贴 SSH public key，快速确认是否已在用户配置中登记。</div>
                        </div>
                        <span class="access-shortcut">Ctrl/⌘ + Enter</span>
                    </div>
                    <div class="ssh-key-check">
                        <textarea class="ssh-key-input" id="ssh-key-input" rows="2" placeholder="ssh-ed25519 AAAA... user@example"></textarea>
                        <button id="check-ssh-key" type="button">检查 Key</button>
                        <span class="access-result ssh-key-result" id="ssh-key-result"></span>
                    </div>
                </div>
                <div class="access-tool-card">
                    <div class="access-tool-card-header">
                        <div>
                            <div class="access-tool-title">添加访问用户</div>
                            <div class="access-tool-desc">录入用户名、SSH Key 和管理 Token，保存后会自动刷新权限矩阵。</div>
                        </div>
                        <span class="access-shortcut">Ctrl/⌘ + Enter</span>
                    </div>
                    <div class="user-add-form">
                        <input class="user-add-input" id="add-user-name" type="text" placeholder="用户名，例如 alice" autocomplete="off">
                        <textarea class="user-add-input user-add-key" id="add-user-key" rows="2" placeholder="ssh-ed25519 AAAA... alice@example"></textarea>
                        <input class="user-add-input" id="add-user-token" type="password" placeholder="管理 Token" autocomplete="off">
                        <button id="add-user" type="button">添加用户</button>
                        <span class="access-result user-add-result" id="add-user-result"></span>
                    </div>
                </div>
            </div>
            <details class="access-section" id="access-section">
                <summary>
                    <div class="access-header">
                        <div class="access-title">用户访问权限</div>
                        <div class="server-summary-meta">
                            <div class="access-meta" id="access-meta">Loading...</div>
                            <span class="collapse-caret" aria-hidden="true">›</span>
                        </div>
                    </div>
                </summary>
                <div class="access-actions">
                    <button id="configure-access" type="button">为选中用户配置选中服务器</button>
                    <button id="select-missing-access" type="button">选择缺失权限</button>
                    <button id="clear-access-selection" type="button">清空选择</button>
                    <span class="access-result" id="access-result"></span>
                </div>
                <div class="access-table-wrap" id="access-matrix">Loading...</div>
            </details>
        </div>
        <div class="servers" id="servers">Loading...</div>
        <div class="refresh-info">Refresh: <span id="interval">-</span>s | Last: <span id="last-update">-</span></div>
    </div>
    
    <script>
        let refreshInterval = 5;
        let latestAccessMatrix = null;
        const collapseState = new Map();
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getSavedOpenState(key, defaultOpen) {
            return collapseState.has(key) ? collapseState.get(key) : defaultOpen;
        }

        function rememberOpenState(element, key) {
            element.addEventListener('toggle', () => {
                collapseState.set(key, element.open);
            });
        }

        function sumProcesses(gpus) {
            return (gpus || []).reduce((count, gpu) => count + ((gpu.processes && gpu.processes.length) || 0), 0);
        }

        function clampPercent(value) {
            const numericValue = Number(value);
            if (!Number.isFinite(numericValue)) {
                return 0;
            }
            return Math.min(100, Math.max(0, numericValue));
        }

        function createCaret() {
            const caret = document.createElement('span');
            caret.className = 'collapse-caret';
            caret.setAttribute('aria-hidden', 'true');
            caret.textContent = '›';
            return caret;
        }
        
        async function init() {
            document.getElementById('configure-access').addEventListener('click', configureSelectedAccess);
            document.getElementById('select-missing-access').addEventListener('click', selectMissingAccess);
            document.getElementById('clear-access-selection').addEventListener('click', clearAccessSelection);
            document.getElementById('check-ssh-key').addEventListener('click', checkSshKeyExists);
            document.getElementById('add-user').addEventListener('click', addUserWithToken);
            document.getElementById('ssh-key-input').addEventListener('keydown', event => {
                if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
                    event.preventDefault();
                    checkSshKeyExists();
                }
            });
            ['add-user-name', 'add-user-key', 'add-user-token'].forEach(id => {
                document.getElementById(id).addEventListener('keydown', event => {
                    if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
                        event.preventDefault();
                        addUserWithToken();
                    }
                });
            });

            try {
                const r = await fetch('/api/servers');
                const cfg = await r.json();
                refreshInterval = cfg.refresh_interval || 5;
                document.getElementById('interval').textContent = refreshInterval;
            } catch(e) {
                document.getElementById('interval').textContent = refreshInterval;
            }
            
            await refresh();
            setInterval(refresh, refreshInterval * 1000);
        }
        
        async function refresh() {
            try {
                const r = await fetch('/api/gpu');
                const data = await r.json();
                render(data);
                await refreshAccessMatrix();
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch(e) {
                const serversDiv = document.getElementById('servers');
                serversDiv.innerHTML = '';
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.textContent = 'Failed to fetch data';
                serversDiv.appendChild(errorDiv);
            }
        }

        async function refreshAccessMatrix() {
            const matrixDiv = document.getElementById('access-matrix');
            const metaDiv = document.getElementById('access-meta');
            try {
                const r = await fetch('/api/access-matrix');
                const data = await r.json();
                renderAccessMatrix(data);
            } catch(e) {
                matrixDiv.innerHTML = '';
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.textContent = 'Failed to fetch access matrix';
                matrixDiv.appendChild(errorDiv);
                metaDiv.textContent = 'Error';
            }
        }

        function renderAccessMatrix(data) {
            const matrixDiv = document.getElementById('access-matrix');
            const metaDiv = document.getElementById('access-meta');
            matrixDiv.innerHTML = '';
            latestAccessMatrix = data;

            const users = data && data.users ? data.users : [];
            const servers = data && data.servers ? data.servers : [];
            metaDiv.textContent = users.length + ' users / ' + servers.length + ' servers';

            if (users.length === 0 || servers.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'error';
                emptyDiv.textContent = 'No users or servers configured';
                matrixDiv.appendChild(emptyDiv);
                return;
            }

            const table = document.createElement('table');
            table.className = 'access-table';

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const userHeader = document.createElement('th');
            userHeader.textContent = '用户';
            headerRow.appendChild(userHeader);

            servers.forEach(server => {
                const th = document.createElement('th');
                th.textContent = server.name;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            users.forEach(user => {
                const row = document.createElement('tr');
                const userCell = document.createElement('td');
                userCell.className = 'access-user';
                userCell.textContent = user.username + ' (' + user.key_count + ' keys)';
                row.appendChild(userCell);

                user.servers.forEach(status => {
                    const cell = document.createElement('td');
                    const label = document.createElement('label');
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'access-pair-select';
                    checkbox.dataset.user = user.username;
                    checkbox.dataset.server = status.server;
                    checkbox.disabled = Boolean(status.error || status.accessible);
                    label.appendChild(checkbox);
                    label.appendChild(document.createTextNode(' '));
                    const statusText = document.createElement('span');
                    if (status.error) {
                        cell.className = 'access-error';
                        statusText.textContent = '错误';
                        cell.title = status.error;
                    } else if (status.accessible) {
                        cell.className = 'access-ok';
                        statusText.textContent = '已开通';
                    } else if (status.user_exists) {
                        cell.className = 'access-missing';
                        statusText.textContent = status.key_installed === false ? '缺少Key' : '不可确认';
                    } else {
                        cell.className = 'access-missing';
                        statusText.textContent = '无用户';
                    }
                    label.appendChild(statusText);
                    cell.appendChild(label);
                    row.appendChild(cell);
                });

                tbody.appendChild(row);
            });
            table.appendChild(tbody);
            matrixDiv.appendChild(table);
        }

        function getSelectedPairs() {
            return Array.from(document.querySelectorAll('.access-pair-select:checked')).map(input => ({
                user: input.dataset.user,
                server: input.dataset.server
            }));
        }

        function setAccessResult(message, isError) {
            const resultDiv = document.getElementById('access-result');
            resultDiv.textContent = message;
            resultDiv.className = isError ? 'access-result access-error' : 'access-result access-ok';
        }

        function setSshKeyResult(message, state) {
            const resultDiv = document.getElementById('ssh-key-result');
            resultDiv.textContent = message;
            if (state === 'ok') {
                resultDiv.className = 'access-result ssh-key-result access-ok';
            } else if (state === 'missing') {
                resultDiv.className = 'access-result ssh-key-result access-missing';
            } else if (state === 'error') {
                resultDiv.className = 'access-result ssh-key-result access-error';
            } else {
                resultDiv.className = 'access-result ssh-key-result';
            }
        }

        function setStateResult(elementId, baseClass, message, state) {
            const resultDiv = document.getElementById(elementId);
            resultDiv.textContent = message;
            if (state === 'ok') {
                resultDiv.className = baseClass + ' access-ok';
            } else if (state === 'missing') {
                resultDiv.className = baseClass + ' access-missing';
            } else if (state === 'error') {
                resultDiv.className = baseClass + ' access-error';
            } else {
                resultDiv.className = baseClass;
            }
        }

        function setAddUserResult(message, state) {
            setStateResult('add-user-result', 'access-result user-add-result', message, state);
        }

        function summarizeSshKeyMatches(matches) {
            const users = (matches || []).map(match => {
                const suffix = match.match_type === 'exact' ? '完整匹配' : 'key body 匹配';
                return match.username + '（' + suffix + '）';
            });
            return users.join('、');
        }

        function clearAccessSelection() {
            document.querySelectorAll('.access-pair-select').forEach(input => {
                input.checked = false;
            });
            setAccessResult('', false);
        }

        function selectMissingAccess() {
            clearAccessSelection();
            if (!latestAccessMatrix || !latestAccessMatrix.users || !latestAccessMatrix.servers) {
                setAccessResult('暂无权限矩阵数据', true);
                return;
            }

            const missingPairs = new Set();
            latestAccessMatrix.users.forEach(user => {
                (user.servers || []).forEach(status => {
                    if (!status.accessible && !status.error) {
                        missingPairs.add(user.username + '\u0000' + status.server);
                    }
                });
            });

            document.querySelectorAll('.access-pair-select').forEach(input => {
                input.checked = missingPairs.has(input.dataset.user + '\u0000' + input.dataset.server);
            });
            setAccessResult('已精确选择缺失权限单元格', false);
        }

        function summarizeConfigureResults(results) {
            let serverCount = 0;
            let userCount = 0;
            let keyCount = 0;
            let errorCount = 0;

            (results || []).forEach(server => {
                serverCount++;
                if (server.error) {
                    errorCount++;
                    return;
                }
                Object.keys(server.users || {}).forEach(username => {
                    const item = server.users[username];
                    userCount++;
                    keyCount += item.keys_added || 0;
                    errorCount += (item.errors || []).length;
                });
            });

            return '完成 ' + serverCount + ' 台服务器 / ' + userCount + ' 个用户，新增 ' + keyCount + ' 个 Key，错误 ' + errorCount + ' 个';
        }

        async function configureSelectedAccess() {
            const button = document.getElementById('configure-access');
            const pairs = getSelectedPairs();

            if (pairs.length === 0) {
                setAccessResult('请至少选择一个用户-服务器权限单元格', true);
                return;
            }

            const adminToken = window.prompt('请输入管理 Token');
            if (!adminToken) {
                setAccessResult('已取消配置：缺少管理 Token', true);
                return;
            }

            button.disabled = true;
            setAccessResult('正在配置，请稍候...', false);

            try {
                const response = await fetch('/api/configure-access', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': adminToken
                    },
                    body: JSON.stringify({pairs: pairs})
                });
                const data = await response.json();
                if (!response.ok || data.error) {
                    setAccessResult('配置失败: ' + (data.error || response.status), true);
                    return;
                }
                setAccessResult(summarizeConfigureResults(data.results), false);
                await refreshAccessMatrix();
            } catch(e) {
                setAccessResult('配置请求失败', true);
            } finally {
                button.disabled = false;
            }
        }

        async function checkSshKeyExists() {
            const button = document.getElementById('check-ssh-key');
            const input = document.getElementById('ssh-key-input');
            const sshKey = input.value.trim();

            if (!sshKey) {
                setSshKeyResult('请先粘贴 SSH public key', 'error');
                return;
            }

            button.disabled = true;
            setSshKeyResult('正在检查...', 'neutral');

            try {
                const response = await fetch('/api/check-ssh-key', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ssh_key: sshKey})
                });
                const data = await response.json();
                if (!response.ok || data.error) {
                    setSshKeyResult('检查失败: ' + (data.error || response.status), 'error');
                    return;
                }
                if (data.exists) {
                    setSshKeyResult('已存在：' + summarizeSshKeyMatches(data.matches), 'ok');
                } else {
                    setSshKeyResult('未找到：当前 user.txt 中没有这把 SSH key', 'missing');
                }
            } catch(e) {
                setSshKeyResult('检查请求失败', 'error');
            } finally {
                button.disabled = false;
            }
        }

        async function addUserWithToken() {
            const button = document.getElementById('add-user');
            const usernameInput = document.getElementById('add-user-name');
            const keyInput = document.getElementById('add-user-key');
            const tokenInput = document.getElementById('add-user-token');
            const username = usernameInput.value.trim();
            const sshKey = keyInput.value.trim();
            const token = tokenInput.value.trim();

            if (!username) {
                setAddUserResult('请填写用户名', 'error');
                return;
            }
            if (!sshKey) {
                setAddUserResult('请粘贴 SSH public key', 'error');
                return;
            }
            if (!token) {
                setAddUserResult('请填写管理 Token', 'error');
                return;
            }

            button.disabled = true;
            setAddUserResult('正在添加用户...', 'neutral');

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': token
                    },
                    body: JSON.stringify({username: username, ssh_key: sshKey})
                });
                const data = await response.json();
                if (!response.ok || data.error) {
                    setAddUserResult('添加失败: ' + (data.error || response.status), 'error');
                    return;
                }
                setAddUserResult('已添加用户 ' + data.username + '，权限矩阵已刷新', 'ok');
                usernameInput.value = '';
                keyInput.value = '';
                await refreshAccessMatrix();
            } catch(e) {
                setAddUserResult('添加请求失败', 'error');
            } finally {
                button.disabled = false;
            }
        }
        
        function render(data) {
            let online = 0, totalGpus = 0, totalProcs = 0;
            const serversDiv = document.getElementById('servers');
            serversDiv.innerHTML = '';
            
            if (!data || data.length === 0) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.textContent = 'No servers';
                serversDiv.appendChild(errorDiv);
                return;
            }
            
            data.forEach(s => {
                const serverCard = document.createElement('details');
                serverCard.className = 'server-card';
                const serverKey = 'server:' + s.server;
                serverCard.open = getSavedOpenState(serverKey, false);
                rememberOpenState(serverCard, serverKey);
                const serverSummary = document.createElement('summary');
                
                const serverHeader = document.createElement('div');
                serverHeader.className = 'server-header';
                
                const serverInfo = document.createElement('div');
                const serverName = document.createElement('div');
                serverName.className = 'server-name';
                serverName.textContent = s.server;
                serverInfo.appendChild(serverName);
                
                if (s.error) {
                    const status = document.createElement('span');
                    status.className = 'status offline';
                    status.textContent = 'Offline';
                    serverHeader.appendChild(serverInfo);
                    const serverMeta = document.createElement('div');
                    serverMeta.className = 'server-summary-meta';
                    const caret = createCaret();
                    serverMeta.appendChild(status);
                    serverMeta.appendChild(caret);
                    serverHeader.appendChild(serverMeta);
                    serverSummary.appendChild(serverHeader);
                    serverCard.appendChild(serverSummary);
                    
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'error';
                    errorDiv.textContent = s.error;
                    serverCard.appendChild(errorDiv);
                } else {
                    online++;
                    if (s.host) {
                        const serverHost = document.createElement('div');
                        serverHost.className = 'server-host';
                        serverHost.textContent = s.host;
                        serverInfo.appendChild(serverHost);
                    }
                    
                    const status = document.createElement('span');
                    status.className = 'status online';
                    status.textContent = 'Online';
                    serverHeader.appendChild(serverInfo);
                    const serverMeta = document.createElement('div');
                    serverMeta.className = 'server-summary-meta';
                    const gpuCount = s.gpus ? s.gpus.length : 0;
                    const procCount = sumProcesses(s.gpus);
                    const serverCount = document.createElement('span');
                    serverCount.className = 'summary-count';
                    serverCount.textContent = gpuCount + ' GPUs / ' + procCount + ' procs';
                    const caret = createCaret();
                    serverMeta.appendChild(serverCount);
                    serverMeta.appendChild(status);
                    serverMeta.appendChild(caret);
                    serverHeader.appendChild(serverMeta);
                    serverSummary.appendChild(serverHeader);
                    serverCard.appendChild(serverSummary);
                    
                    const gpuList = document.createElement('div');
                    gpuList.className = 'gpu-list';
                    
                    if (s.gpus) {
                        totalGpus += s.gpus.length;
                        s.gpus.forEach(g => {
                            const gpuItem = document.createElement('details');
                            gpuItem.className = 'gpu-item';
                            const hasProcesses = Boolean(g.processes && g.processes.length > 0);
                            const gpuKey = serverKey + ':gpu:' + g.index;
                            gpuItem.open = getSavedOpenState(gpuKey, false);
                            rememberOpenState(gpuItem, gpuKey);
                            const gpuSummary = document.createElement('summary');
                            
                            const gpuHeader = document.createElement('div');
                            gpuHeader.className = 'gpu-header';
                            
                            const gpuName = document.createElement('span');
                            gpuName.className = 'gpu-name';
                            gpuName.textContent = g.name;
                            
                            const gpuId = document.createElement('span');
                            gpuId.className = 'gpu-id';
                            gpuId.textContent = 'GPU ' + g.index;
                            
                            gpuHeader.appendChild(gpuName);
                            const gpuMeta = document.createElement('div');
                            gpuMeta.className = 'gpu-summary-meta';
                            const gpuUtil = document.createElement('span');
                            gpuUtil.className = 'summary-count';
                            gpuUtil.textContent = 'GPU ' + g.gpu_util + '%';
                            const gpuMemory = document.createElement('span');
                            gpuMemory.className = 'summary-count';
                            gpuMemory.textContent = g.memory_used + '/' + g.memory_total + ' MB';
                            const gpuProcesses = document.createElement('span');
                            gpuProcesses.className = 'summary-count';
                            gpuProcesses.textContent = (hasProcesses ? g.processes.length : 0) + ' procs';
                            const gpuCaret = createCaret();
                            gpuMeta.appendChild(gpuId);
                            gpuMeta.appendChild(gpuUtil);
                            gpuMeta.appendChild(gpuMemory);
                            gpuMeta.appendChild(gpuProcesses);
                            gpuMeta.appendChild(gpuCaret);
                            gpuHeader.appendChild(gpuMeta);
                            gpuSummary.appendChild(gpuHeader);
                            gpuItem.appendChild(gpuSummary);
                            
                            const metrics = document.createElement('div');
                            metrics.className = 'metrics';
                            
                            const gpuPercent = clampPercent(g.gpu_util);
                            const memPercent = clampPercent(g.memory_total > 0 ? (g.memory_used / g.memory_total * 100) : 0).toFixed(1);
                            
                            const metricBox1 = document.createElement('div');
                            metricBox1.className = 'metric-box';
                            metricBox1.innerHTML = '<div class="metric-label">GPU</div><div class="metric-value">' + g.gpu_util + '%</div><div class="progress-bar"><div class="progress-fill gpu" style="width:' + gpuPercent + '%"></div></div>';
                            
                            const metricBox2 = document.createElement('div');
                            metricBox2.className = 'metric-box';
                            metricBox2.innerHTML = '<div class="metric-label">Memory</div><div class="metric-value">' + g.memory_used + '/' + g.memory_total + ' MB</div><div class="progress-bar"><div class="progress-fill memory" style="width:' + memPercent + '%"></div></div>';
                            
                            metrics.appendChild(metricBox1);
                            metrics.appendChild(metricBox2);
                            gpuItem.appendChild(metrics);
                            
                            if (hasProcesses) {
                                totalProcs += g.processes.length;
                                const procList = document.createElement('details');
                                procList.className = 'process-list';
                                const processKey = gpuKey + ':processes';
                                procList.open = getSavedOpenState(processKey, false);
                                rememberOpenState(procList, processKey);
                                const procSummary = document.createElement('summary');
                                
                                const procTitle = document.createElement('div');
                                procTitle.className = 'process-title';
                                const procLabel = document.createElement('span');
                                procLabel.textContent = 'Users (' + g.processes.length + ')';
                                const procCaret = createCaret();
                                procTitle.appendChild(procLabel);
                                procTitle.appendChild(procCaret);
                                procSummary.appendChild(procTitle);
                                procList.appendChild(procSummary);
                                const procItems = document.createElement('div');
                                procItems.className = 'process-items';
                                
                                g.processes.forEach(p => {
                                    const procItem = document.createElement('div');
                                    procItem.className = 'process-item';
                                    
                                    const procUser = document.createElement('span');
                                    procUser.className = 'process-user';
                                    procUser.textContent = p.user;
                                    
                                    const procMemory = document.createElement('span');
                                    procMemory.className = 'process-memory';
                                    procMemory.textContent = p.memory + ' MB';
                                    
                                    procItem.appendChild(procUser);
                                    procItem.appendChild(procMemory);
                                    procItems.appendChild(procItem);
                                });
                                procList.appendChild(procItems);
                                
                                gpuItem.appendChild(procList);
                            } else {
                                const noProc = document.createElement('div');
                                noProc.className = 'no-process';
                                noProc.textContent = 'No processes';
                                gpuItem.appendChild(noProc);
                            }
                            
                            gpuList.appendChild(gpuItem);
                        });
                    }
                    
                    serverCard.appendChild(gpuList);
                }
                
                serversDiv.appendChild(serverCard);
            });
            
            document.getElementById('total-servers').textContent = online + '/' + data.length;
            document.getElementById('total-gpus').textContent = totalGpus;
            document.getElementById('total-processes').textContent = totalProcs;
        }
        
        init();
    </script>
</body>
</html>
